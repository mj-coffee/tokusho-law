<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>特定商取引法に基づく表記</title>
</head>
<body>
  <h1>特定商取引法に基づく表記</h1>

  <p><strong>事業者名：</strong>あなたの名前</p>
  <p><strong>責任者：</strong>あなたの名前</p>
  <p><strong>所在地：</strong>あなたの住所</p>
  <p><strong>メール：</strong>example@email.com</p>

  <p><strong>販売価格：</strong>各サービスページに記載</p>
  <p><strong>支払い方法：</strong>クレジットカード（Stripe）</p>
  <p><strong>支払い時期：</strong>決済時</p>

  <p><strong>商品の引き渡し時期：</strong>決済後すぐ利用可能</p>

  <p><strong>返品・キャンセル：</strong>サービスの性質上、原則不可</p>
</body>
</html>
